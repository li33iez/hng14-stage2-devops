name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install eslint
        run: npm install -g eslint

      - name: Run eslint
        run: npx eslint frontend

      - name: Install hadolint
        run: |
          wget https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x hadolint-Linux-x86_64
          sudo mv hadolint-Linux-x86_64 /usr/local/bin/hadolint

      - name: Lint API Dockerfile
        run: hadolint api/Dockerfile

      - name: Lint Worker Dockerfile
        run: hadolint worker/Dockerfile

      - name: Lint Frontend Dockerfile
        run: hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=api --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api:latest
            ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/worker:latest
            ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:latest
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy API scan
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD:/work \
          aquasec/trivy:0.56.2 image \
          --severity CRITICAL \
          --exit-code 1 \
          --format sarif \
          -o /work/trivy-api.sarif \
          ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}

      - name: Run Trivy Worker scan
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD:/work \
          aquasec/trivy:0.56.2 image \
          --severity CRITICAL \
          --exit-code 1 \
          --format sarif \
          -o /work/trivy-worker.sarif \
          ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}

      - name: Upload SARIF API
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif

      - name: Upload SARIF Worker
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif

  integration:
    runs-on: ubuntu-latest
    needs: scan
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for healthy
        run: |
          timeout 120 bash -c '
          while ! docker compose ps --format json | jq -e "all(.[]; .Health == \"healthy\" or .Health == \"\")"; do 
            docker compose ps
            sleep 5
          done
          '

      - name: Test API health
        run: docker exec hng14-stage2-devops-api-1 curl -sf http://localhost:8000/health

      - name: Test API root
        run: docker exec hng14-stage2-devops-api-1 curl -sf http://localhost:8000/

      - name: Test Frontend
        run: docker exec hng14-stage2-devops-frontend-1 wget --spider -q http://localhost:3000

      - name: Run integration script
        run: |
          chmod +x ./integration.sh
          ./integration.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
