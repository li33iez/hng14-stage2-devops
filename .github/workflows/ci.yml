name: ci/cid pipeline

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install flake8
        run: pip install flake8

      - name: run flake8
        run: flake8 api worker

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install eslint
        run: npm install eslint

      - name: run eslint
        run: npx eslint frontend

      - name: install hadolint
        run: |
          wget https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x hadolint-Linux-x86_64
          sudo mv hadolint-Linux-x86_64 /usr/local/bin/hadolint

      - name: lint api dockerfile
        run: hadolint api/Dockerfile

      - name: lint worker dockerfile
        run: hadolint worker/Dockerfile

      - name: lint frontend dockerfile
        run: hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: pip install -r api/requirements.txt

      - name: run tests
        run: cd api && pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: login to ghcr
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: build api
        run: docker build -t ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }} ./api

      - name: build worker
        run: docker build -t ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }} ./worker

      - name: build frontend
        run: docker build -t ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }} ./frontend

      - name: push api
        run: docker push ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}

      - name: push worker
        run: docker push ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}

      - name: push frontend
        run: docker push ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: install trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/download/v0.56.2/trivy_0.56.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.56.2_Linux-64bit.deb

      - name: scan api
        run: trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy.sarif ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  integration:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x ./integration.sh
      - run: ./integration.sh
      - run: docker compose down
