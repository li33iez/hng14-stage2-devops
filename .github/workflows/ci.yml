name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 api worker
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install eslint
        run: npm install -g eslint
      - name: Run eslint
        run: npx eslint frontend
      - name: Install hadolint
        run: |
          wget https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x hadolint-Linux-x86_64
          sudo mv hadolint-Linux-x86_64 /usr/local/bin/hadolint
      - name: Lint API Dockerfile
        run: hadolint api/Dockerfile
      - name: Lint Worker Dockerfile
        run: hadolint worker/Dockerfile
      - name: Lint Frontend Dockerfile
        run: hadolint frontend/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-ver[31;1H[?1049l[23;0;0t[?1l>[?2004l[?1l>[?1049h[22;0;0t[1;31r[?12l[?25h[39;49m]104(B[m[4l[?7h[H[2J[?2004h[?1h=[?1h=(B[0;7m  GNU nano 7.2                                             New Buffer *                                                     [1;123H(B[m[30d(B[0;7m^G(B[m Help[30;16H(B[0;7m^O(B[m Write Out   (B[0;7m^W(B[m Where Is    (B[0;7m^K(B[m Cut[30;61H(B[0;7m^T(B[m Execute     (B[0;7m^C(B[m Location    (B[0;7mM-U(B[m Undo[106G(B[0;7mM-A(B[m Set Mark[31d(B[0;7m^X(B[m Exit[31;16H(B[0;7m^R(B[m Read File   (B[0;7m^\(B[m Replace     (B[0;7m^U(B[m Paste[61G(B[0;7m^J(B[m Justify     (B[0;7m^/(B[m Go To Line  (B[0;7mM-E(B[m Redo[106G(B[0;7mM-6(B[m Copyusername: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api:latest
            ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/worker:latest
            ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:latest
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy API scan
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD:/work \
          aquasec/trivy:0.56.2 image \
          --severity CRITICAL \
          --exit-code 1 \
          --format sarif \
          -o /work/trivy-api.sarif \
          ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}
      - name: Run Trivy Worker scan
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD:/work \
          aquasec/trivy:0.56.2 image \
          --severity CRITICAL \
          --exit-code 1 \
          --format sarif \
          -o /work/trivy-worker.sarif \
          ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}
      - name: Upload SARIF API
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api
      - name: Upload SARIF Worker
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Start services
        run: docker compose up -d --build

      # FIXED SECTION (ONLY CHANGE)
      - name: Wait for healthy
        run: |
          for i in {1..30}; do
            echo "Checking services health..."

            if docker compose ps | grep -q "(unhealthy)"; then
              echo "Still unhealthy..."
              docker compose ps
              sleep 5
            else
              echo "All services are healthy"
              docker compose ps
              exit 0
            fi
          done

          echo "Timeout waiting for services to become healthy"
          exit 1

      - name: Run integration script
        run: |
          chmod +x ./integration.sh
          ./integration.sh
      - name: Rolling update - API
        run: docker compose up -d --no-deps --build api
      - name: Rolling update - Worker
        run: docker compose up -d --no-deps --build worker
      - name: Rolling update - Frontend
        run: docker compose up -d --no-deps --build frontend
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
