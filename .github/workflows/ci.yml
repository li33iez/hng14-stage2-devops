name: simple-ci-cd-pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  TAG: ${{ github.sha }}

# =========================
# 1. LINT
# =========================
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install flake8
        run: pip install flake8

      - name: run python lint
        run: flake8 api worker

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install eslint
        run: npm install  eslint

      - name: run frontend lint
        run: |
          cd frontend
          npx eslint .


# =========================
# 2. TEST
# =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install pytest

      - name: run tests
        run: cd api && pytest


# =========================
# 3. BUILD + PUSH
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: build api image
        run: docker build -t $REGISTRY/api:$TAG ./api

      - name: build worker image
        run: docker build -t $REGISTRY/worker:$TAG ./worker

      - name: build frontend image
        run: docker build -t $REGISTRY/frontend:$TAG ./frontend

      - name: push api image
        run: docker push $REGISTRY/api:$TAG

      - name: push worker image
        run: docker push $REGISTRY/worker:$TAG

      - name: push frontend image
        run: docker push $REGISTRY/frontend:$TAG


# =========================
# 4. SECURITY SCAN
# =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: install trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: scan api image
        run: trivy image --severity CRITICAL --exit-code 1 $REGISTRY/api:$TAG

      - name: scan worker image
        run: trivy image --severity CRITICAL --exit-code 1 $REGISTRY/worker:$TAG

      - name: scan frontend image
        run: trivy image --severity CRITICAL --exit-code 1 $REGISTRY/frontend:$TAG


# =========================
# 5. INTEGRATION TEST
# =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: start services
        run: docker compose up -d

      - name: wait for services
        run: sleep 20

      - name: test frontend
        run: curl -f http://localhost:3000

      - name: test api
        run: curl -f http://localhost:8000/status

      - name: stop services
        if: always()
        run: docker compose down


# =========================
# 6. DEPLOY
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: deploy message
        run: echo "Deployment successful (simulation)"
