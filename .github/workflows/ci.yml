name: simple-ci-cd-pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]



env:
  REGISTRY: localhost:5000
  TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true



# =========================
# 1. LINT
# =========================
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: get code
        uses: actions/checkout@v4

      # Python lint
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install flake8
        run: pip install flake8

      - name: run python lint
        run: flake8 api worker || true

      # JS lint
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: install eslint
        run: npm install -g eslint

      - name: run frontend lint
        run: eslint frontend || true


# =========================
# 2. TEST
# =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: get code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install test tools
        run: pip install pytest

      - name: run tests
        run: cd api && pytest || true


# =========================
# 3. BUILD + PUSH
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: get code
        uses: actions/checkout@v4

      - name: build api image
        run: docker build -t $REGISTRY/api:$TAG ./api

      - name: build worker image
        run: docker build -t $REGISTRY/worker:$TAG ./worker

      - name: build frontend image
        run: docker build -t $REGISTRY/frontend:$TAG ./frontend

      - name: push images
        run: |
          docker push $REGISTRY/api:$TAG || true
          docker push $REGISTRY/worker:$TAG || true
          docker push $REGISTRY/frontend:$TAG || true


# =========================
# 4. SECURITY SCAN
# =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: install trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: scan api image
        run: trivy image $REGISTRY/api:$TAG || true

      - name: scan worker image
        run: trivy image $REGISTRY/worker:$TAG || true

      - name: scan frontend image
        run: trivy image $REGISTRY/frontend:$TAG || true


# =========================
# 5. INTEGRATION TEST
# =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: get code
        uses: actions/checkout@v4

      - name: start app
        run: docker compose up -d

      - name: wait
        run: sleep 20

      - name: test frontend
        run: curl http://localhost:3000 || true

      - name: test api
        run: curl http://localhost:8000/status || true

      - name: stop app
        if: always()
        run: docker compose down


# =========================
# 6. DEPLOY (ONLY MAIN)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: deploy message
        run: echo "deploying app to production..."
