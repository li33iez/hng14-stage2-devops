name: cicd pipeline

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install flake8
        run: pip install flake8

      - name: run flake8
        run: flake8 api worker

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install eslint
        run: npm install eslint

      - name: run eslint
        run: npx eslint frontend

      - name: install hadolint
        run: |
          wget https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x hadolint-Linux-x86_64
          sudo mv hadolint-Linux-x86_64 /usr/local/bin/hadolint

      - name: lint api dockerfile
        run: hadolint api/Dockerfile

      - name: lint worker dockerfile
        run: hadolint worker/Dockerfile

      - name: lint frontend dockerfile
        run: hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: pip install -r api/requirements.txt

      - name: run tests
        run: cd api && pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: login to ghcr
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: build api
        run: docker build -t ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }} ./api

      - name: build worker
        run: docker build -t ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }} ./worker

      - name: build frontend
        run: docker build -t ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }} ./frontend

      - name: push api
        run: docker push ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}

      - name: push worker
        run: docker push ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}

      - name: push frontend
        run: docker push ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pull trivy image
        run: docker pull aquasec/trivy:0.56.2

      - name: Scan api image
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD:/work \
          aquasec/trivy:0.56.2 image \
          --severity CRITICAL --exit-code 1 --format sarif -o /work/trivy-api.sarif \
          ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}

      - name: Scan worker image
        run: |
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD:/work \
          aquasec/trivy:0.56.2 image \
          --severity CRITICAL --exit-code 1 --format sarif -o /work/trivy-worker.sarif \
          ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}

      - name: Upload SARIF api
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload SARIF worker
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

  integration:
    runs-on: ubuntu-latest
    needs: scan
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services healthy
        run: |
          timeout 120 bash -c '
          while true; do
            echo "Waiting for containers to be healthy..."
            docker compose ps
            sleep 5

            if docker compose ps | grep -E "unhealthy|starting|restarting"; then
              continue
            fi

            break
          done
          '

      - name: Test API health
        run: docker exec hng14-stage2-devops-api-1 curl -sf http://localhost:8000/health

      - name: Test API root
        run: docker exec hng14-stage2-devops-api-1 curl -sf http://localhost:8000/

      - name: Test Frontend
        run: docker exec hng14-stage2-devops-frontend-1 wget --spider -q http://localhost:3000

      - name: Run integration script
        run: |
          chmod +x ./integration.sh
          ./integration.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
