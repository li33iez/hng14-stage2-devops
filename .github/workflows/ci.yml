name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: localhost:5000
  TAG: ${{ github.sha }}

# =========================
# 1. LINT
# =========================
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint (API + Worker)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint API + Worker
        run: flake8 api worker

      # JS lint (Frontend)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install eslint
        run: npm install -g eslint

      - name: Lint frontend
        run: eslint frontend || true

      # Docker lint
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: |
            api/Dockerfile
            worker/Dockerfile
            frontend/Dockerfile


# =========================
# 2. TEST
# =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          pip install pytest pytest-cov

      - name: Run API tests
        run: |
          cd api
          pytest --cov=. --cov-report=xml || true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# =========================
# 3. BUILD + PUSH IMAGES
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      # API
      - name: Build API
        run: |
          docker build -t $REGISTRY/api:$TAG ./api
          docker tag $REGISTRY/api:$TAG $REGISTRY/api:latest

      # WORKER
      - name: Build Worker
        run: |
          docker build -t $REGISTRY/worker:$TAG ./worker
          docker tag $REGISTRY/worker:$TAG $REGISTRY/worker:latest

      # FRONTEND
      - name: Build Frontend
        run: |
          docker build -t $REGISTRY/frontend:$TAG ./frontend
          docker tag $REGISTRY/frontend:$TAG $REGISTRY/frontend:latest

      - name: Push images
        run: |
          docker push $REGISTRY/api:$TAG
          docker push $REGISTRY/api:latest
          docker push $REGISTRY/worker:$TAG
          docker push $REGISTRY/worker:latest
          docker push $REGISTRY/frontend:$TAG
          docker push $REGISTRY/frontend:latest


# =========================
# 4. SECURITY SCAN (TRIVY)
# =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Scan API
        run: trivy image --severity CRITICAL --exit-code 1 $REGISTRY/api:$TAG

      - name: Scan Worker
        run: trivy image --severity CRITICAL --exit-code 1 $REGISTRY/worker:$TAG

      - name: Scan Frontend
        run: trivy image --severity CRITICAL --exit-code 1 $REGISTRY/frontend:$TAG


# =========================
# 5. INTEGRATION TEST
# =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 30

      # Submit job through frontend
      - name: Submit job
        run: |
          curl -X POST http://localhost:3000/submit \
          -H "Content-Type: application/json" \
          -d '{"job":"test"}'

      # Poll API
      - name: Poll job status
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/status | jq -r .status)
            echo $STATUS
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down


# =========================
# 6. DEPLOY (MAIN ONLY)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy API
        run: |
          set -e

          docker pull $REGISTRY/api:$TAG

          docker stop api_old || true
          docker rename api api_old || true

          docker run -d --name api_new -p 8000:8000 $REGISTRY/api:$TAG

          for i in {1..12}; do
            if curl -f http://localhost:8000/health; then
              echo "Healthy"
              docker rm -f api_old || true
              docker rename api_new api
              exit 0
            fi
            sleep 5
          done

          echo "Rollback triggered"
          docker rm -f api_new || true
          docker start api_old
          exit 1
