version: "3.9"

services:

  redis:
    image: redis:7-alpine
    networks:
      - hngjob

    expose:
      - "${REDIS_PORT}"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT}"
          memory: "${REDIS_MEMORY_LIMIT}"


  api:
    build: ./api

    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - hngjob

    ports:
      - "${API_PORT}:${API_PORT}"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT}"
          memory: "${API_MEMORY_LIMIT}"


  worker:
    build: ./worker

    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - hngjob

    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT}"
          memory: "${WORKER_MEMORY_LIMIT}"


  frontend:
    build: ./frontend

    environment:
      - API_URL=${API_URL}
      - PORT=${FRONTEND_PORT}

    depends_on:
      api:
        condition: service_healthy

    networks:
      - hngjob

    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"

    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT}"
          memory: "${FRONTEND_MEMORY_LIMIT}"


networks:
  hngjob:
    driver: bridge
